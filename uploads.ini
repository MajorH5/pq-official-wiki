upload_max_filesize = 500M
post_max_size = 500M
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
; Do not print PHP stack traces to the HTTP response (use logs instead).
display_errors = Off
display_startup_errors = Off
; So $_ENV is populated (docker-compose env → LocalSettings PQ_GRANT_* checks).
variables_order = EGPCS