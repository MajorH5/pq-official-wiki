# name: pqwiki

services:
  database:
    container_name: wikidb
    image: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - db:/var/lib/mysql

  mediawiki:
    container_name: mediawiki
    build: ./mediawiki
    restart: always
    env_file:
      - .env
    # Dev: grant the Pywikibot account (WIKI_BOT_USER) editor+API rights without DB group rows.
    # Unset PQ_GRANT_PQADMIN_IMPORT_RIGHTS in production and use Special:UserRights → bot or editor.
    environment:
      PQ_GRANT_PQADMIN_IMPORT_RIGHTS: "1"
      PQ_WIKI_IMPORT_USERNAME: ${WIKI_BOT_USER:-Pqadmin}
      WG_SERVER: ${WG_SERVER:-http://localhost:8080}
      # Optional dev-only: set to 1 to show MediaWiki exception stack traces in the browser (never in prod).
      # PQ_WIKI_SHOW_EXCEPTION_DETAILS: "1"
    ports:
      - "8080:80"
    depends_on:
      - database
    volumes:
      - images:/var/www/html/images
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./LocalSettings.php:/var/www/html/LocalSettings.php
      - ./LocalSettings.pixelquest-snippet.php:/var/www/html/LocalSettings.pixelquest-snippet.php:ro
      # Dev: always use repo extension (avoids stale/broken image COPY). Remove for image-only deploys.
      - ./mediawiki/extensions/PixelQuestRoblox:/var/www/html/extensions/PixelQuestRoblox:ro
      # Optional: pq-datadump.json for Roblox profile item/skin lookups (set PQ_DATADUMP_PATH=/var/www/html/pq-datadump.json)
      - ./pq-datadump.json:/var/www/html/pq-datadump.json:ro

  pqwikibot:
    container_name: wikibot
    build: ./bot
    depends_on:
      - mediawiki
    ports:
      - "8081:8081"
    volumes:
      - ./bot:/bot
      # Layout wikitext for `python -m pq_wiki import-templates`
      - ./mediawiki/wiki_templates:/mediawiki/wiki_templates:ro
    working_dir: /bot
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYWIKIBOT_DIR: /bot
      # Ensure bot user is set even if .env omits or blanks WIKI_BOT_USER
      WIKI_BOT_USER: ${WIKI_BOT_USER:-Pqadmin}
      WIKI_LAYOUT_TEMPLATES_DIR: /mediawiki/wiki_templates
      WIKI_MEDIAWIKI_HOST: mediawiki
      INGEST_HOST: 0.0.0.0
      INGEST_PORT: "8081"
    command: python -m pq_wiki serve

volumes:
  db:
  images: